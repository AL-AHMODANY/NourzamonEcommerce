<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Noor Bazaar | Shopping Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="shortcut icon" href="https://i.pinimg.com/736x/58/67/db/5867db7b9a402c14211202425b741154.jpg" type="image/x-icon">
    <style>
        :root {
            --bg-light: #f8f9fa;
            --bg-dark: #0a0f1c;
            --card-light: #ffffff;
            --card-dark: #141b2b;
            --text-light: #212529;
            --text-dark: #e9ecef;
            --primary-green: #2ecc71;
            --dark-green: #1f8b4c;
            --error-red: #e74c3c;
        }

        body {
            transition: background-color 0.3s ease, color 0.3s ease;
            background-color: var(--bg-light);
            color: var(--text-light);
        }

        body.dark-mode {
            background-color: var(--bg-dark);
            color: var(--text-dark);
        }

        body.dark-mode .navbar,
        body.dark-mode footer {
            background-color: #0f172a !important;
        }

        body.dark-mode .card {
            background-color: var(--card-dark);
            border: 1px solid #2d3748;
        }

        body.dark-mode .table {
            color: var(--text-dark);
        }

        body.dark-mode .table-striped>tbody>tr:nth-of-type(odd) {
            background-color: rgba(46, 204, 113, 0.05);
        }

        .navbar {
            transition: all 0.3s ease;
        }

        .theme-toggle {
            cursor: pointer;
            background: var(--primary-green);
            border: none;
            border-radius: 50px;
            padding: 8px 16px;
            color: white;
            font-weight: 500;
        }

        .cart-table img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 12px;
        }

        .quantity-input {
            width: 70px;
            text-align: center;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            padding: 5px;
        }

        body.dark-mode .quantity-input {
            background-color: #1f2937;
            border-color: #374151;
            color: white;
        }

        .btn-remove {
            background: none;
            border: none;
            color: var(--error-red);
            transition: all 0.3s;
            padding: 5px 10px;
            border-radius: 8px;
        }

        .btn-remove:hover {
            background-color: rgba(231, 76, 60, 0.1);
            transform: scale(1.05);
        }

        .cart-summary {
            background: linear-gradient(135deg, rgba(46, 204, 113, 0.1), rgba(31, 139, 76, 0.05));
            border-radius: 20px;
            padding: 25px;
            position: sticky;
            top: 100px;
        }

        .btn-checkout {
            background: var(--primary-green);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 30px;
            font-weight: 600;
            width: 100%;
        }

        .btn-checkout:hover {
            background: var(--dark-green);
            transform: translateY(-2px);
        }

        .btn-continue {
            background: transparent;
            border: 2px solid var(--primary-green);
            color: var(--primary-green);
            border-radius: 50px;
            padding: 10px 25px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
        }

        .btn-continue:hover {
            background: var(--primary-green);
            color: white;
        }

        .empty-cart {
            text-align: center;
            padding: 80px 20px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .cart-toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1100;
            background: var(--primary-green);
            color: white;
            border-radius: 50px;
            padding: 12px 24px;
            animation: slideInRight 0.4s ease;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .cart-table img {
                width: 60px;
                height: 60px;
            }

            .quantity-input {
                width: 55px;
            }

            .cart-summary {
                position: static;
                margin-top: 30px;
            }

            .cart-table thead {
                display: none;
            }

            .cart-table tbody tr {
                display: block;
                margin-bottom: 20px;
                border: 1px solid #e0e0e0;
                border-radius: 15px;
                padding: 15px;
            }

            body.dark-mode .cart-table tbody tr {
                border-color: #2d3748;
            }

            .cart-table tbody td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                text-align: right;
                border: none;
                padding: 8px 0;
            }

            .cart-table tbody td:before {
                content: attr(data-label);
                font-weight: bold;
                text-align: left;
                margin-right: 15px;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-lg">
        <div class="container">
            <a class="navbar-brand fw-bold text-success" href="index.html"><i class="bi bi-moon-stars-fill"></i> Noor
                Zamon</a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                    <li class="nav-item">
                        <a class="nav-link position-relative active" href="cart.html">
                            <i class="bi bi-cart-fill"></i> Cart
                            <span id="cartCountBadge"
                                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-success">0</span>
                        </a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <button id="darkModeToggle" class="theme-toggle"><i class="bi bi-moon-stars"></i>
                            Dark/Light</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="container py-5">
        <div id="cartContent"></div>
    </section>

    <footer class="bg-dark text-white pt-5 pb-3 mt-5">
        <div class="container">
            <div class="row">
                <div class="col-md-4 mb-4">
                    <h5 class="text-success">Noor Zamon</h5>
                    <p>Your trusted destination for authentic Islamic goods.</p>
                </div>
                <div class="col-md-4 mb-4">
                    <h5>Quick Links</h5>
                    <ul class="list-unstyled">
                        <li><a href="index.html" class="text-white-50">Home</a></li>
                        <li><a href="shop.html" class="text-white-50">Shop</a></li>
                        <li><a href="about.html" class="text-white-50">About</a></li>
                        <li><a href="contact.html" class="text-white-50">Contact</a></li>
                    </ul>
                </div>
                <div class="col-md-4 mb-4">
                    <h5>Connect</h5>
                    <i class="bi bi-facebook fs-4 me-3"></i>
                    <i class="bi bi-instagram fs-4 me-3"></i>
                    <i class="bi bi-twitter fs-4"></i>
                </div>
            </div>
            <hr>
            <div class="text-center small">© 2026 Noor Islamic Zamon</div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();

        let cart = JSON.parse(localStorage.getItem('islamicCart')) || [];

        function updateCartBadge() {
            const badge = document.getElementById('cartCountBadge');
            if (badge) {
                const total = cart.reduce((sum, item) => sum + item.quantity, 0);
                badge.innerText = total;
            }
        }

        function saveCart() {
            localStorage.setItem('islamicCart', JSON.stringify(cart));
            updateCartBadge();
            renderCart();
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'cart-toast';
            toast.innerHTML = `<i class="bi bi-check-circle-fill me-2"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        window.updateQuantity = function (id, newQuantity) {
            const item = cart.find(i => i.id === id);
            if (item) {
                if (newQuantity <= 0) {
                    window.removeItem(id);
                } else {
                    item.quantity = newQuantity;
                    saveCart();
                    showToast('Cart updated');
                }
            }
        };

        window.removeItem = function (id) {
            const item = cart.find(i => i.id === id);
            if (item) {
                cart = cart.filter(i => i.id !== id);
                saveCart();
                showToast(`${item.name} removed`);
            }
        };

        window.checkout = function () {
            if (cart.length === 0) {
                showToast('Your cart is empty!');
                return;
            }
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const shipping = total > 50 ? 0 : 5.99;
            const tax = total * 0.1;
            const grandTotal = total + shipping + tax;

            if (confirm(`Total: $${grandTotal.toFixed(2)}\nProceed to checkout?`)) {
                cart = [];
                saveCart();
                showToast('🎉 Order placed successfully! JazakAllah Khair!');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            }
        };

        function renderCart() {
            const container = document.getElementById('cartContent');

            if (!cart || cart.length === 0) {
                container.innerHTML = `
        <div class="empty-cart">
          <i class="bi bi-cart-x fs-1 text-muted"></i>
          <h3 class="mt-3">Your cart is empty</h3>
          <p class="text-muted">Add some beautiful Islamic items from our shop!</p>
          <a href="shop.html" class="btn btn-success rounded-pill px-5 mt-3">
            <i class="bi bi-shop"></i> Continue Shopping
          </a>
        </div>
      `;
                return;
            }

            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const shipping = subtotal > 50 ? 0 : 5.99;
            const tax = subtotal * 0.1;
            const total = subtotal + shipping + tax;

            container.innerHTML = `
      <div class="row">
        <div class="col-lg-8">
          <div class="card border-0 shadow-lg rounded-4">
            <div class="card-body p-4">
              <h3 class="fw-bold text-success mb-4"><i class="bi bi-bag-check"></i> Cart Items (${cart.reduce((s, i) => s + i.quantity, 0)} items)</h3>
              <div class="table-responsive">
                <table class="table cart-table">
                  <thead>
                    <tr><th>Product</th><th>Price</th><th>Quantity</th><th>Total</th><th></th></tr>
                  </thead>
                  <tbody>
                    ${cart.map(item => `
                      <tr>
                        <td data-label="Product">
                          <div class="d-flex align-items-center gap-3">
                            <img src="${item.image}" alt="${item.name}">
                            <div><h6 class="fw-bold mb-1">${item.name}</h6></div>
                          </div>
                        </td>
                        <td data-label="Price">$${item.price.toFixed(2)}</td>
                        <td data-label="Quantity">
                          <input type="number" class="quantity-input" value="${item.quantity}" min="1" max="99" 
                                 onchange="updateQuantity(${item.id}, parseInt(this.value))">
                        </td>
                        <td data-label="Total" class="fw-bold text-success">$${(item.price * item.quantity).toFixed(2)}</td>
                        <td data-label="Remove">
                          <button class="btn-remove" onclick="removeItem(${item.id})">
                            <i class="bi bi-trash3-fill fs-5"></i>
                          </button>
                        </td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
              <div class="mt-3">
                <a href="shop.html" class="btn-continue"><i class="bi bi-arrow-left"></i> Continue Shopping</a>
              </div>
            </div>
          </div>
        </div>
        <div class="col-lg-4">
          <div class="cart-summary">
            <h4 class="fw-bold text-success mb-4">Order Summary</h4>
            <div class="d-flex justify-content-between mb-3">
              <span>Subtotal</span>
              <span class="fw-bold">$${subtotal.toFixed(2)}</span>
            </div>
            <div class="d-flex justify-content-between mb-3">
              <span>Shipping</span>
              <span class="fw-bold">${shipping === 0 ? 'Free' : '$' + shipping.toFixed(2)}</span>
            </div>
            <div class="d-flex justify-content-between mb-3">
              <span>Tax (10%)</span>
              <span class="fw-bold">$${tax.toFixed(2)}</span>
            </div>
            <hr>
            <div class="d-flex justify-content-between mb-4">
              <span class="fs-5 fw-bold">Total</span>
              <span class="fs-4 fw-bold text-success">$${total.toFixed(2)}</span>
            </div>
            ${shipping > 0 ? `<div class="alert alert-info small py-2 mb-3">Add $${(50 - subtotal).toFixed(2)} more for FREE shipping!</div>` :
                    `<div class="alert alert-success small py-2 mb-3">You've earned FREE shipping!</div>`}
            <button class="btn-checkout" onclick="checkout()">
              <i class="bi bi-credit-card"></i> Proceed to Checkout
            </button>
          </div>
        </div>
      </div>
    `;
        }

        // Dark Mode
        const darkToggle = document.getElementById('darkModeToggle');
        if (localStorage.getItem('darkMode') === 'enabled') document.body.classList.add('dark-mode');
        darkToggle?.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode') ? 'enabled' : 'disabled');
        });

        renderCart();
        updateCartBadge();

        // Listen for cart updates from other tabs
        window.addEventListener('storage', (e) => {
            if (e.key === 'islamicCart') {
                cart = JSON.parse(e.newValue) || [];
                renderCart();
                updateCartBadge();
            }
        });
    </script>
</body>

</html>
